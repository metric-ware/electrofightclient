<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrofight</title>
    <link rel="icon" type="image/png" href="sprites/logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="joinScreen">
      <div id="lobbyShell">
        <div id="lobbyMap" aria-hidden="true">
          <div class="lobbyGrid"></div>
          <div class="lobbyBase baseAlly">Ally</div>
          <div class="lobbyBase baseEnemy">Enemy</div>
          <img
            class="lobbySprite lobbyAlly"
            src="sprites/allyplayer.png"
            alt=""
          />
          <img
            class="lobbySprite lobbyEnemy"
            src="sprites/enemyplayer.png"
            alt=""
          />
        </div>
        <form id="joinForm">
          <div id="menuEyebrow">Multiplayer shooter game</div>
          <div id="menuTitle">Electrofight</div>
          <p id="menuCopy">FIGHT ENEMIES, BUILD BASES, CREATE CLANS</p>
          <label for="nameInput">Nickname</label>
          <input
            id="nameInput"
            type="text"
            placeholder="Player"
            autocomplete="off"
          />
          <label for="serverSelect">Server</label>
          <select id="serverSelect">
            <option value="wss://eu.electrofight.org">Europe</option>
            <!--
            <option value="ws://localhost:3000">Localhost</option>
            -->
          </select>
          <button type="submit">play game</button>
          <div id="menuStatus"></div>
        </form>
      </div>
    </div>
    <div id="hud">
      <div id="statusPanel">
        <div id="energyCounter">
          <span
            >Energy <strong id="energyAmount">1000</strong> /
            <strong id="energyMax">1000</strong></span
          ><span>Score <strong id="scoreAmount">0</strong></span>
        </div>
        <div id="fpsCounter">FPS: 0 TPS: 0</div>
        <button id="clanButton" type="button">Clan</button>
      </div>
      <div id="buildBar">
        <button data-build="core" type="button"><span>1</span>Core</button>
        <button data-build="wall" type="button"><span>2</span>Wall</button>
        <button data-build="solar" type="button"><span>3</span>Solar</button>
        <button data-build="turret" type="button"><span>4</span>Turret</button>
        <button data-build="shield" type="button"><span>5</span>Shield</button>
      </div>
      <div id="leaderboard">
        <div id="leaderboardTitle">Leaderboard</div>
        <div id="leaderboardList"></div>
      </div>
      <canvas id="minimap"></canvas>
      <div id="clanRequestsPopup"></div>
      <div id="chatOverlay">
        <input
          id="chatInput"
          type="text"
          maxlength="30"
          placeholder="Message"
          autocomplete="off"
        />
      </div>
      <div id="notice"></div>
    </div>
    <div id="upgradePanel"></div>
    <div id="clanPanel"></div>
    <script src="script.js"></script>
  </body>
</html>
